{% load static %}

<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>


<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" href="{% static 'css/styles.css' %}">

<!-- FontAwesome -->
<script src="https://kit.fontawesome.com/cb792c0850.js" crossorigin="anonymous"></script>


</head>

<body>

<div class="container py-4">


<!-- Header -->
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold">👋 Hello, {{ user.username }}</h3>

    <div class="d-flex gap-2">
        <button onclick="toggleTheme()" id="themeBtn" class="btn btn-outline-light btn-sm">
  🌙
</button>

        <a href="{% url 'signout' %}" class="btn btn-dark btn-sm">
            <i class="fa-solid fa-right-from-bracket"></i>
        </a>
    </div>
</div>

<!-- Stats -->
<div class="row text-center mb-4">
    <div class="col">
        <div class="card p-2 bg-primary text-white shadow-sm">
            Total: {{ total }}
        </div>
    </div>
    <div class="col">
        <div class="card p-2 bg-success text-white shadow-sm">
            Completed: {{ completed }}
        </div>
    </div>
    <div class="col">
        <div class="card p-2 bg-warning text-dark shadow-sm">
            Pending: {{ pending }}
        </div>
    </div>
</div>

<!-- Add Task -->
<form method="post" class="mb-4">
    {% csrf_token %}
    <div class="input-group">
        <input type="text" name="title" required minlength="2"
               class="form-control"
               placeholder="What is the task today?">
        <button class="btn btn-primary">Add</button>
    </div>
</form>

<!-- Todo List -->
<ul class="list-group">

    {% for todo in res %}
    <li class="list-group-item d-flex justify-content-between align-items-center">

        <span class="{% if todo.is_completed %}completed text-muted{% endif %}">
            {{ todo.title }}
        </span>

        <div class="d-flex gap-2 align-items-center">

            <!-- Toggle -->
            <a href="{% url 'toggle_complete' todo.srno %}"
               class="btn btn-sm {% if todo.is_completed %}btn-secondary{% else %}btn-success{% endif %}">
                <i class="fa-solid fa-check"></i>
            </a>

            <!-- Edit -->
            <a href="{% url 'edit_todo' todo.srno %}" class="btn btn-warning btn-sm">
                <i class="fa-solid fa-pen-to-square"></i>
            </a>

            <!-- Delete -->
            <form action="{% url 'delete_todo' todo.srno %}" method="post" class="d-inline">
                {% csrf_token %}
                <button class="btn btn-danger btn-sm"
                        onclick="return confirm('Delete this task?')">
                    <i class="fa-solid fa-trash"></i>
                </button>
            </form>

        </div>
    </li>

    {% empty %}
    <li class="list-group-item text-center text-muted">
        📝 No tasks yet. Add your first task!
    </li>
    {% endfor %}

</ul>


</div>

<script src="{% static 'js/todo.js' %}"></script>

</body>
</html>
