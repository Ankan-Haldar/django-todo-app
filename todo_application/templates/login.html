{% load static %}

<!DOCTYPE html>

<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="initial-scale=1, width=device-width" />

  <link rel="stylesheet" href="{% static 'css/index.css' %}" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="signup-login">
    <div class="signup-box1">


  <form method="post">
    {% csrf_token %}

    <div class="heading">Login</div>
    <div class="line"></div>

    <!-- 🔴 ERROR MESSAGE -->
    {% if error %}
    <p style="color:red; text-align:center;">{{ error }}</p>
    {% endif %}

    <div class="field">
      <b>Username</b>
      <input class="inp" type="text" name="fnm" required placeholder="Enter Username">
    </div>

    <div class="field">
      <b>Password</b>
      <input class="inp" type="password" name="pwd" required placeholder="Enter Password">
    </div>

    <div class="field">
      <input class="submit-button" type="submit" value="Login">
    </div>

    <div class="line"></div>

    <div class="field" style="text-align:center;">
      <b>Don't have an account?</b><br>
      <a class="anc" href="{% url 'signup' %}">Signup</a>
    </div>

  </form>

</div>

  </div>
</body>

</html>
